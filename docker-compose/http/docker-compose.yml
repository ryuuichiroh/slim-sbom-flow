#####################################################
# Dependency-Track with Keycloak OIDC Integration
#
# This configuration includes:
#   - Dependency-Track API Server (with OIDC)
#   - Dependency-Track FrontEnd (with OIDC)
#   - PostgreSQL Database
#   - Keycloak (OIDC Provider)
#   - (Optional) Trivy Server
#
# For medium to large teams requiring centralized authentication.
#####################################################

services:
  apiserver:
    image: dependencytrack/apiserver
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      # Database Configuration
      ALPINE_DATABASE_MODE: "external"
      ALPINE_DATABASE_URL: "jdbc:postgresql://postgres:5432/dtrack"
      ALPINE_DATABASE_DRIVER: "org.postgresql.Driver"
      ALPINE_DATABASE_USERNAME: "dtrack"
      ALPINE_DATABASE_PASSWORD: "dtrack"

      # OIDC Configuration
      ALPINE_OIDC_ENABLED: "true"
      ALPINE_OIDC_ISSUER: "http://keycloak.local:8083/realms/dtrack"
      ALPINE_OIDC_CLIENT_ID: "dependency-track"
      ALPINE_OIDC_USERNAME_CLAIM: "preferred_username"
      ALPINE_OIDC_TEAMS_CLAIM: "groups"
      ALPINE_OIDC_USER_PROVISIONING: "true"
      ALPINE_OIDC_TEAM_SYNCHRONIZATION: "true"

    deploy:
      resources:
        limits:
          memory: 12288m
        reservations:
          memory: 8192m
      restart_policy:
        condition: on-failure
    ports:
      - "8081:8080"
    extra_hosts:
      - "keycloak.local:host-gateway"
    volumes:
      - "dtrack-data:/data"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    image: dependencytrack/frontend
    depends_on:
      apiserver:
        condition: service_healthy
    environment:
      # The base URL of the API server
      API_BASE_URL: "http://localhost:8081"

      # OIDC Configuration for Frontend
      OIDC_ISSUER: "http://keycloak.local:8083/realms/dtrack"
      OIDC_CLIENT_ID: "dependency-track"
      OIDC_SCOPE: "openid profile email"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "dtrack"
      POSTGRES_USER: "dtrack"
      POSTGRES_PASSWORD: "dtrack"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 3
    volumes:
      - "postgres-data:/var/lib/postgresql/data"
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev"]
    environment:
      # Admin Console Credentials
      KC_BOOTSTRAP_ADMIN_USERNAME: "admin"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "admin"

      # Hostname Configuration
      KC_HOSTNAME: "keycloak.local"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    networks:
      default:
        aliases:
          - keycloak.local
    ports:
      - "8083:8080"
    volumes:
      - "keycloak-data:/opt/keycloak/data"
    healthcheck:
      test:
        ["CMD-SHELL", "timeout 1s sh -c '> /dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Optional: Trivy Server for enhanced vulnerability scanning
  trivy:
    image: aquasec/trivy:latest
    command:
      - server
      - --listen
      - 0.0.0.0:8082
    environment:
      TRIVY_TOKEN: trivy-token
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
    volumes:
      - trivy-cache:/root/.cache/trivy
    ports:
      - "8082:8082"
    restart: unless-stopped

volumes:
  dtrack-data: {}
  postgres-data: {}
  keycloak-data: {}
  trivy-cache: {} # Uncomment if using Trivy
