#####################################################
# Dependency-Track - Basic Setup
#
# This configuration includes:
#   - Dependency-Track API Server
#   - Dependency-Track FrontEnd
#   - PostgreSQL Database
#   - (Optional) Trivy Server
#
# For small teams starting with basic authentication.
# For OIDC integration, see ../oidc/docker-compose.yml
#####################################################

services:
  apiserver:
    image: dependencytrack/apiserver
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database Configuration
      ALPINE_DATABASE_MODE: "external"
      ALPINE_DATABASE_URL: "jdbc:postgresql://postgres:5432/dtrack"
      ALPINE_DATABASE_DRIVER: "org.postgresql.Driver"
      ALPINE_DATABASE_USERNAME: "dtrack"
      ALPINE_DATABASE_PASSWORD: "changeme"  # IMPORTANT: Change this in production

      # Optional: Enable CORS for API access from different origins
      # ALPINE_CORS_ENABLED: "true"
      # ALPINE_CORS_ALLOW_ORIGIN: "*"

      # Optional: Configure logging level
      # LOGGING_LEVEL: "INFO"

    deploy:
      resources:
        limits:
          memory: 12288m
        reservations:
          memory: 8192m
      restart_policy:
        condition: on-failure
    ports:
      - "8081:8080"
    volumes:
      - "dtrack-data:/data"
    restart: unless-stopped

  frontend:
    image: dependencytrack/frontend
    depends_on:
      apiserver:
        condition: service_healthy
    environment:
      # The base URL of the API server
      # IMPORTANT: Replace localhost with your server's IP or domain if accessed from other machines
      API_BASE_URL: "http://localhost:8081"
    ports:
      - "8080:8080"
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "dtrack"
      POSTGRES_USER: "dtrack"
      POSTGRES_PASSWORD: "changeme"  # IMPORTANT: Change this in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 3
    volumes:
      - "postgres-data:/var/lib/postgresql/data"
    restart: unless-stopped

  # Optional: Trivy Server for enhanced vulnerability scanning
  # Uncomment this section if you want to enable Trivy integration in Dependency-Track
  # trivy:
  #   image: aquasec/trivy:latest
  #   command:
  #     - server
  #     - --listen
  #     - 0.0.0.0:8082
  #     - --token
  #     - changeme  # IMPORTANT: Change this token and configure it in Dependency-Track
  #   volumes:
  #     - trivy-cache:/root/.cache/trivy
  #   ports:
  #     - "8082:8082"
  #   restart: unless-stopped

volumes:
  dtrack-data: {}
  postgres-data: {}
  # trivy-cache: {}  # Uncomment if using Trivy
